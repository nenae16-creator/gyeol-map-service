# 팀원 공유용 데모 배포 — GitHub Pages (정적)
# 서브경로(/gyeol-map-service/)로 서비스되므로 build 시 --base 를 준다.
# 주의: /api/road-distance 서버리스 함수는 정적 호스팅에서 동작하지 않는다.
#       roadDistanceClient가 실패를 'unavailable'로 처리하므로 체험 흐름에는 영향 없음.
name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -- --base=/gyeol-map-service/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
